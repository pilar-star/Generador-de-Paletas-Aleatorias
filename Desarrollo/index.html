<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COLORFLY</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">
        <div class="header-contenido">
            <h1 class="header-titulo">Colorfly Studio</h1>
            <p class="header-descripción">Especialistas en Propuestas Visuales</p>
        </div>
    </header>

    <main class="main">
        <section class="cantidad-colores">
            <h2>➤ Elegí la cantidad de colores que querés que tenga tu paleta</h2>
            <div id="cantidad-colores-contenedor">
                <button id="btn-4">4</button>
                <button id="btn-6">6</button>
                <button id="btn-8">8</button>
                <button id="btn-10">10</button>
            </div>
        </section>
        <section class="btn-principal">
            <h2>➤Ahora presiona el siguiente botón para generar tu paleta</h2>
            <button id="generar-paleta">Generar Paleta</button>
        </section>
    </main>

    <script src="JS/script.js" defer></script>
</body>
</html>
